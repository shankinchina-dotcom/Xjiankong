name: xjiankong

services:
  trendradar:
    image: ${TRENDRADAR_IMAGE}
    container_name: xjiankong-trendradar
    restart: unless-stopped
    depends_on:
      rss-proxy:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Taipei}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 */4 * * *}
      RUN_MODE: ${RUN_MODE:-cron}
      IMMEDIATE_RUN: ${IMMEDIATE_RUN:-false}
      AI_ANALYSIS_ENABLED: ${AI_ANALYSIS_ENABLED:-false}
      AI_TRANSLATION_ENABLED: ${AI_TRANSLATION_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat}
      AI_API_BASE: ${AI_API_BASE:-}
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config:ro
      - ${OUTPUT_DIR:-./output}:/app/output
    networks:
      - collector

  rss-proxy:
    image: ${RSS_PROXY_IMAGE}
    container_name: xjiankong-rss-proxy
    restart: unless-stopped
    read_only: true
    volumes:
      - ./proxy/config.yaml:/root/.config/mihomo/config.yaml:ro
      - ./proxy/data:/root/.config/mihomo/data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - collector

  report-web:
    image: ${REPORT_WEB_IMAGE}
    container_name: xjiankong-report-web
    restart: unless-stopped
    read_only: true
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${OUTPUT_DIR:-./output}:/source:ro
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - publish

  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    container_name: xjiankong-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      report-web:
        condition: service_healthy
    networks:
      - publish

networks:
  collector:
    internal: false
  publish:
    internal: false
