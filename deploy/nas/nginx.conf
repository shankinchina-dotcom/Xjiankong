worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name _;
    root /source;
    autoindex off;
    disable_symlinks on;
    error_page 403 =404 @not_found;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
    }

    location ~ ^/(news|rss|meta|config)(/|$) {
      return 404;
    }

    location ~ (^|/)\. {
      return 404;
    }

    location ~* \.(db|sqlite|sqlite3|env|yaml|yml|json)$ {
      return 404;
    }

    location ~* \.(db|sqlite|sqlite3|env|yaml|yml|json)(?:[./]) {
      return 404;
    }

    location = / {
      try_files /index.html =404;
    }

    location = /index.html {
      try_files $uri =404;
    }

    location ~* ^/html/.+\.html$ {
      try_files $uri =404;
    }

    location /html/ {
      return 404;
    }

    location / {
      return 404;
    }

    location @not_found {
      internal;
      return 404;
    }
  }
}
